<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta | El Mago Ferretero</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(91,33,182,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(255,106,0,0.18), transparent 24%),
        linear-gradient(180deg, #121212 0%, #0b0b0b 100%);
    }

    .auth-wrap {
      width: 100%;
      max-width: 560px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #bfbfbf;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: #ff6a00;
    }

    .auth-card {
      width: 100%;
      background: rgba(21,21,21,0.96);
      border: 1px solid #242424;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 22px 44px rgba(0,0,0,0.30);
      backdrop-filter: blur(10px);
    }

    .auth-logo {
      width: 78px;
      height: 78px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.28);
      background: #111;
    }

    .auth-badge {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid #3a2d22;
      background: rgba(255,106,0,0.08);
      color: #ffb37a;
      border-radius: 999px;
      font-size: 12px;
      margin: 0 auto 14px;
    }

    .badge-wrap {
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      color: #ff6a00;
      text-align: center;
      font-size: 34px;
    }

    .subtitle {
      text-align: center;
      color: #d0d0d0;
      margin-bottom: 24px;
      line-height: 1.5;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field {
      margin-bottom: 2px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
      color: #f0f0f0;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 12px;
      color: white;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      font-size: 14px;
    }

    input:focus {
      border-color: #ff6a00;
      box-shadow: 0 0 0 3px rgba(255,106,0,0.10);
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d0d0d0;
      margin-top: 6px;
      font-size: 14px;
    }

    .checkbox-wrap input {
      width: auto;
      accent-color: #ff6a00;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6a00 0%, #ff8b3d 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      box-shadow: 0 12px 24px rgba(255,106,0,0.18);
      transition: transform 0.15s ease, opacity 0.15s ease;
      margin-top: 18px;
    }

    .btn:hover {
      opacity: 0.97;
      transform: translateY(-1px);
    }

    #mensaje {
      margin-top: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 12px;
      padding: 12px;
      min-height: 64px;
      color: #d7d7d7;
      font-size: 14px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #d0d0d0;
      font-size: 14px;
      line-height: 1.5;
    }

    .auth-footer a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: bold;
    }

    .auth-footer a:hover {
      opacity: 0.95;
    }

    @media (max-width: 600px) {
      .auth-card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="index.html" class="back-link">← Volver al inicio</a>

    <div class="auth-card">
      <img src="logo.jpg" alt="Logo El Mago Ferretero" class="auth-logo" />

      <div class="badge-wrap">
        <div class="auth-badge">Nueva cuenta</div>
      </div>

      <h1>Crear cuenta</h1>
      <div class="subtitle">
        Registrate para comprar más rápido, guardar tus datos y recibir promociones.
      </div>

      <div class="grid">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" placeholder="Tu nombre" />
        </div>

        <div class="field">
          <label for="apellido">Apellido</label>
          <input id="apellido" type="text" placeholder="Tu apellido" />
        </div>

        <div class="field full">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Tu email" />
        </div>

        <div class="field full">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="Creá una contraseña" />
        </div>

        <div class="field full">
          <label for="telefono">Teléfono</label>
          <input id="telefono" type="text" placeholder="Tu número de teléfono" />
        </div>

        <div class="field full">
          <label for="direccion">Dirección</label>
          <input id="direccion" type="text" placeholder="Tu dirección" />
        </div>

        <div class="field">
          <label for="ciudad">Ciudad</label>
          <input id="ciudad" type="text" placeholder="Tu ciudad" />
        </div>

        <div class="field">
          <label for="codigo_postal">Código postal</label>
          <input id="codigo_postal" type="text" placeholder="Tu código postal" />
        </div>

        <div class="field full">
          <div class="checkbox-wrap">
            <input id="acepta_promociones" type="checkbox" checked />
            <label for="acepta_promociones" style="margin:0; font-weight:normal;">
              Quiero recibir promociones y beneficios por email
            </label>
          </div>
        </div>
      </div>

      <button id="btnRegistro" type="button" class="btn">Crear cuenta</button>

      <div id="mensaje">Cargando sistema...</div>

      <div class="auth-footer">
        ¿Ya tenés cuenta? <a href="login.html">Ingresá</a>
      </div>
    </div>
  </div>

  <script>
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = '✅ Sistema cargado. Ya podés registrarte.';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://vgfkluhqxngqoginpdmg.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZmtsdWhxeG5ncW9naW5wZG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU0NTYsImV4cCI6MjA5MTA4MTQ1Nn0.BYUiAbd7jmDnxd9jWXGpnOp2fDEjD8xVtJF-NVLN6U8";

    if (!window.supabase) {
      mensaje.textContent = "❌ No cargó la librería de Supabase.";
    } else {
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);

      document.getElementById('btnRegistro').addEventListener('click', async function () {
        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const telefono = document.getElementById('telefono').value.trim();
        const direccion = document.getElementById('direccion').value.trim();
        const ciudad = document.getElementById('ciudad').value.trim();
        const codigo_postal = document.getElementById('codigo_postal').value.trim();
        const acepta_promociones = document.getElementById('acepta_promociones').checked;

        mensaje.textContent = "Procesando registro...";

        if (!nombre || !apellido || !email || !password || !telefono || !direccion || !ciudad || !codigo_postal) {
          mensaje.textContent = "❌ Completá todos los campos.";
          return;
        }

        try {
          const { data, error } = await client.auth.signUp({
            email,
            password
          });

          if (error) {
            mensaje.textContent = "❌ Error al crear usuario:\n" + error.message;
            return;
          }

          const userId = data?.user?.id;

          if (!userId) {
            mensaje.textContent = "❌ No se pudo obtener el ID del usuario.";
            return;
          }

          const { error: profileError } = await client
            .from('profiles')
            .insert([{
              id: userId,
              nombre,
              apellido,
              telefono,
              direccion,
              ciudad,
              codigo_postal,
              acepta_promociones
            }]);

          if (profileError) {
            mensaje.textContent = "❌ Usuario creado, pero hubo un error al guardar el perfil:\n" + profileError.message;
            return;
          }

          mensaje.textContent =
            "✅ Registro completo.\n\n" +
            "Se creó tu usuario y se guardaron tus datos.\n" +
            "Ahora podés iniciar sesión.";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1400);

        } catch (e) {
          mensaje.textContent = "❌ Error JavaScript:\n" + e.message;
          console.error(e);
        }
      });
    }
  </script>
</body>
</html>
