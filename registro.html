<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | El Mago Ferretero</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(91,33,182,0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(255,106,0,0.18), transparent 24%),
        linear-gradient(180deg, #121212 0%, #0b0b0b 100%);
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #151515;
      border: 1px solid #242424;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.22);
    }

    h1 {
      margin-top: 0;
      color: #ff6a00;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #d0d0d0;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #ff6a00;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      color: #d0d0d0;
    }

    .checkbox-wrap input {
      width: auto;
      accent-color: #ff6a00;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #ff6a00;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.95;
    }

    #mensaje {
      margin-top: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      padding: 12px;
      min-height: 70px;
      color: #d7d7d7;
    }

    .link {
      margin-top: 18px;
      text-align: center;
      color: #d0d0d0;
    }

    .link a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Crear cuenta</h1>
    <div class="subtitle">
      Registrate para guardar tus datos, ver beneficios y comprar más rápido.
    </div>

    <div class="grid">
      <div>
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" placeholder="Tu nombre">
      </div>

      <div>
        <label for="apellido">Apellido</label>
        <input id="apellido" type="text" placeholder="Tu apellido">
      </div>

      <div class="full">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Tu email">
      </div>

      <div class="full">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Creá una contraseña">
      </div>

      <div class="full">
        <label for="telefono">Teléfono</label>
        <input id="telefono" type="text" placeholder="Tu número de teléfono">
      </div>

      <div class="full">
        <label for="direccion">Dirección</label>
        <input id="direccion" type="text" placeholder="Tu dirección">
      </div>

      <div>
        <label for="ciudad">Ciudad</label>
        <input id="ciudad" type="text" placeholder="Tu ciudad">
      </div>

      <div>
        <label for="codigo_postal">Código postal</label>
        <input id="codigo_postal" type="text" placeholder="Tu código postal">
      </div>

      <div class="full checkbox-wrap">
        <input id="acepta_promociones" type="checkbox" checked>
        <label for="acepta_promociones" style="margin:0; font-weight:normal;">
          Quiero recibir promociones y beneficios por email
        </label>
      </div>
    </div>

    <button id="btnRegistro" type="button">Registrarme</button>

    <div id="mensaje">Cargando sistema...</div>

    <div class="link">
      ¿Ya tenés cuenta? <a href="login.html">Ingresá</a>
    </div>
  </div>

  <script>
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = '✅ JavaScript cargó bien. Ahora cargando Supabase...';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://vgfkluhqxngqoginpdmg.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZmtsdWhxeG5ncW9naW5wZG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU0NTYsImV4cCI6MjA5MTA4MTQ1Nn0.BYUiAbd7jmDnxd9jWXGpnOp2fDEjD8xVtJF-NVLN6U8";

    if (!window.supabase) {
      mensaje.textContent = "❌ No cargó la librería de Supabase.";
    } else {
      mensaje.textContent = "✅ Supabase cargó bien. Completá el formulario para registrarte.";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);

      document.getElementById('btnRegistro').addEventListener('click', async function () {
        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const telefono = document.getElementById('telefono').value.trim();
        const direccion = document.getElementById('direccion').value.trim();
        const ciudad = document.getElementById('ciudad').value.trim();
        const codigo_postal = document.getElementById('codigo_postal').value.trim();
        const acepta_promociones = document.getElementById('acepta_promociones').checked;

        mensaje.textContent = "Procesando registro...";

        if (!nombre || !apellido || !email || !password || !telefono || !direccion || !ciudad || !codigo_postal) {
          mensaje.textContent = "❌ Completá todos los campos.";
          return;
        }

        try {
          const { data, error } = await client.auth.signUp({
            email: email,
            password: password
          });

          if (error) {
            mensaje.textContent = "❌ Error al crear usuario:\n" + error.message;
            return;
          }

          const userId = data?.user?.id;

          if (!userId) {
            mensaje.textContent = "❌ No se pudo obtener el ID del usuario.";
            return;
          }

          const { error: profileError } = await client
            .from('profiles')
            .insert([
              {
                id: userId,
                nombre: nombre,
                apellido: apellido,
                telefono: telefono,
                direccion: direccion,
                ciudad: ciudad,
                codigo_postal: codigo_postal,
                acepta_promociones: acepta_promociones
              }
            ]);

          if (profileError) {
            mensaje.textContent = "❌ Usuario creado, pero hubo un error al guardar el perfil:\n" + profileError.message;
            return;
          }

          mensaje.textContent =
            "✅ Registro completo.\n\n" +
            "Se creó tu usuario y se guardaron tus datos.\n" +
            "Ahora podés iniciar sesión.";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1800);

        } catch (e) {
          mensaje.textContent = "❌ Error JavaScript:\n" + e.message;
          console.error(e);
        }
      });
    }
  </script>
</body>
</html>
