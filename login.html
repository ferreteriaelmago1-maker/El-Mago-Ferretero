<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | El Mago Ferretero</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(91,33,182,0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(255,106,0,0.18), transparent 24%),
        linear-gradient(180deg, #121212 0%, #0b0b0b 100%);
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #151515;
      border: 1px solid #242424;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.22);
    }

    h1 {
      margin-top: 0;
      color: #ff6a00;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #d0d0d0;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #ff6a00;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #ff6a00;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #mensaje {
      margin-top: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      padding: 12px;
      min-height: 70px;
      color: #d7d7d7;
    }

    .link {
      margin-top: 18px;
      text-align: center;
      color: #d0d0d0;
    }

    .link a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ingresar</h1>
    <div class="subtitle">
      Entrá con tu cuenta para seguir comprando más rápido.
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Tu email">

    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="Tu contraseña">

    <button id="btnLogin" type="button">Ingresar</button>

    <div id="mensaje">Cargando sistema...</div>

    <div class="link">
      ¿No tenés cuenta? <a href="registro.html">Registrate</a>
    </div>
  </div>

  <script>
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = '✅ JavaScript cargó bien. Ahora cargando Supabase para login...';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://vgfkluhqxngqoginpdmg.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZmtsdWhxeG5ncW9naW5wZG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU0NTYsImV4cCI6MjA5MTA4MTQ1Nn0.BYUiAbd7jmDnxd9jWXGpnOp2fDEjD8xVtJF-NVLN6U8";

    if (!window.supabase) {
      mensaje.textContent = "❌ No cargó la librería de Supabase.";
    } else {
      mensaje.textContent = "✅ Supabase cargó bien. Probá iniciar sesión.";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);

      document.getElementById('btnLogin').addEventListener('click', async function () {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        mensaje.textContent = "Procesando login...";

        if (!email || !password) {
          mensaje.textContent = "❌ Completá email y contraseña.";
          return;
        }

        try {
          const { error } = await client.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) {
            mensaje.textContent = "❌ Error al iniciar sesión:\n" + error.message;
            return;
          }

          mensaje.textContent = "✅ Login correcto. Redirigiendo...";

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);

        } catch (e) {
          mensaje.textContent = "❌ Error JavaScript:\n" + e.message;
          console.error(e);
        }
      });
    }
  </script>
</body>
</html>
