<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #151515;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 28px;
    }
    h1 { color: #ff6a00; margin-top: 0; text-align: center; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      color: white;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff6a00;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    #mensaje {
      margin-top: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      padding: 12px;
      min-height: 70px;
    }
    .link {
      margin-top: 16px;
      text-align: center;
    }
    .link a {
      color: #ff6a00;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ingresar</h1>

    <input id="email" type="email" placeholder="Tu email">
    <input id="password" type="password" placeholder="Tu contraseña">

    <button id="btnLogin" type="button">Ingresar</button>

    <div id="mensaje">Cargando script de login...</div>

    <div class="link">
      ¿No tenés cuenta? <a href="registro.html">Registrate</a>
    </div>
  </div>

  <script>
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = '✅ JavaScript cargó bien. Ahora cargando Supabase para login...';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://vgfkluhqxngqoginpdmg.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZmtsdWhxeG5ncW9naW5wZG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU0NTYsImV4cCI6MjA5MTA4MTQ1Nn0.BYUiAbd7jmDnxd9jWXGpnOp2fDEjD8xVtJF-NVLN6U8";

    if (!window.supabase) {
      mensaje.textContent = "❌ No cargó la librería de Supabase.";
    } else {
      mensaje.textContent = "✅ Supabase cargó bien. Probá iniciar sesión.";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);

      document.getElementById('btnLogin').addEventListener('click', async function () {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        mensaje.textContent = "Procesando login...";

        if (!email || !password) {
          mensaje.textContent = "❌ Completá email y contraseña.";
          return;
        }

        try {
          const { data, error } = await client.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) {
            mensaje.textContent = "❌ Error Supabase:\n" + error.message;
            return;
          }

          mensaje.textContent = "✅ Login correcto. Redirigiendo...";
          console.log("LOGIN OK:", data);

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);

        } catch (e) {
          mensaje.textContent = "❌ Error JavaScript:\n" + e.message;
          console.error(e);
        }
      });
    }
  </script>
</body>
</html>
