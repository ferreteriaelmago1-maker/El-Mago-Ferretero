<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Mago Ferretero</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0B0B0B;
  color:white;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0B0B0B;
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom:1px solid #222;
}

.logo {
  color:#FF6A00;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:25px;
  align-items:center;
}

.menu a {
  color:white;
  text-decoration:none;
}

.menu a:hover {
  color:#FF6A00;
}

/* DROPDOWN */
.dropdown-container {
  position:relative;
}

.dropdown {
  display:none;
  position:absolute;
  top:30px;
  left:0;
  background:#111;
  border-radius:10px;
  min-width:200px;
}

.dropdown a {
  display:block;
  padding:12px;
}

.dropdown a:hover {
  background:#FF6A00;
}

.dropdown-container:hover .dropdown {
  display:block;
}

/* HEADER */
header {
  background:url('logo.jpg') center/150% no-repeat;
  padding:160px 20px;
  text-align:center;
}

/* BOTONES */
.btn {
  padding:10px 20px;
  background:#FF6A00;
  color:white;
  text-decoration:none;
  margin:5px;
  display:inline-block;
  border-radius:8px;
}

/* PRODUCTOS */
.section {
  padding:40px;
  text-align:center;
}

.products {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#1a1a1a;
  padding:20px;
  width:200px;
  border-radius:10px;
}

/* WHATSAPP */
.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🧙 El Mago Ferretero</div>

  <div class="menu">
    <a href="#">Inicio</a>

    <div class="dropdown-container">
      <a href="#">Catálogo ▼</a>
      <div class="dropdown">
        <a href="#">Herramientas</a>
        <a href="#">Electricidad</a>
        <a href="#">Plomería</a>
        <a href="#">Pinturería</a>
        <a href="#">Tornillería</a>
        <a href="#">Jardín</a>
      </div>
    </div>

    <a href="#">Contacto</a>
  </div>
</nav>

<!-- PORTADA -->
<header>
  <h1 style="color:#FF6A00;">EL MAGO FERRETERO</h1>
  <p>Todo lo que necesitás en ferretería</p>
</header>

<!-- PRODUCTOS -->
<div class="section">
  <h2>Productos destacados</h2>

  <div class="products">
    <div class="card">
      <h3>Llave ajustable</h3>
      <p>$1000</p>
      <a class="btn" href="https://wa.me/541127416948?text=Hola,%20quiero%20comprar%20la%20llave%20ajustable">Comprar</a>
    </div>

    <div class="card">
      <h3>Destornillador</h3>
      <p>$2000</p>
      <a class="btn" href="https://wa.me/541127416948?text=Hola,%20quiero%20comprar%20el%20destornillador">Comprar</a>
    </div>
  </div>
</div>

<!-- BOTÓN WHATSAPP -->
<a href="https://wa.me/541127416948" class="whatsapp-btn">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

</body>
</html>
